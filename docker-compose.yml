# Local development stack: the API + PostgreSQL.
services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: db
      DATABASE_USERNAME: vapor
      DATABASE_PASSWORD: vapor
      DATABASE_NAME: graphexplorer
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vapor
      POSTGRES_PASSWORD: vapor
      POSTGRES_DB: graphexplorer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor -d graphexplorer"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
