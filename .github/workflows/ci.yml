name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/graphexplorer-sync

jobs:
  test:
    name: Build & test (Linux, Swift 6.3)
    runs-on: ubuntu-latest
    container: swift:6.3-noble
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        # Tests run against an in-memory SQLite database (see configure.swift),
        # so no service containers are needed.
        run: swift test

  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  deploy:
    name: Deploy Bicep to Azure (TravelAPI resource group)
    runs-on: ubuntu-latest
    needs: publish
    # Flip the repository variable AZURE_DEPLOY_ENABLED to 'true' once the
    # AZURE_CREDENTIALS / AZURE_RESOURCE_GROUP secrets exist.
    if: github.ref == 'refs/heads/main' && vars.AZURE_DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy infrastructure + new image
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infrastructure/main.bicep \
            --parameters dockerImage=$IMAGE:${{ github.sha }}
