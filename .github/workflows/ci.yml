name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (Linux, Swift 6.3)
    runs-on: ubuntu-latest
    container: swift:6.3-noble
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        # Tests run against an in-memory SQLite database (see configure.swift),
        # so no service containers are needed.
        run: swift test

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t graphexplorer-sync:${{ github.sha }} .

